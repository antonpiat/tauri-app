syntax = "proto3";

package auth;

enum AuthStatus {
  PENDING = 0;
  COMPLETED = 1;
}

message AuthSignUpRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  AuthStatus status = 4;
}

message User {
  string id = 1;
  string username = 2;
  string email = 3;
  AuthStatus status = 4;
}

message AuthUserResponse {
  string  id = 1;
  string username = 2;
  string email = 3;
  AuthStatus status = 4;
}

message AuthResponse {
  optional AuthUserResponse user = 1;
  string message = 2;
  bool success = 3;
  int32 code = 4;
  string token = 5;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message GetUserRequest {
  string token = 1;
}

service AuthService {
  rpc Register(AuthSignUpRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc GetUser(GetUserRequest) returns (AuthResponse);
}